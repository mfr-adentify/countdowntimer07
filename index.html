<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nedtælling | Eksklusivt Tilbud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --midnight: #05070a;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--midnight);
            background-image: 
                radial-gradient(circle at 50% -20%, #1e293b 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #0f172a 0%, transparent 30%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
        }

        .serif {
            font-family: 'Cormorant Garamond', serif;
        }

        .premium-border {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .gold-text {
            color: var(--gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .unit-box {
            position: relative;
            transition: transform 0.3s ease;
        }

        .unit-box:hover {
            transform: translateY(-5px);
        }

        .number {
            font-size: 5rem;
            font-weight: 100;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--gold);
            opacity: 0.8;
        }

        .separator {
            font-size: 3rem;
            color: rgba(212, 175, 55, 0.2);
            padding-top: 0.5rem;
        }

        /* Dekorative elementer */
        .line {
            height: 1px;
            width: 60px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 2rem auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade {
            animation: fadeIn 1.5s ease-out forwards;
        }

        @media (max-width: 768px) {
            .number { font-size: 3rem; }
            .separator { display: none; }
            .unit-box { min-width: 80px; }
        }
    </style>
</head>
<body>

    <div class="max-w-4xl w-full px-6 text-center animate-fade">
        <header class="mb-12">
            <span class="label mb-4 block">Tidsbegrænset Mulighed</span>
            <h1 class="serif text-4xl md:text-6xl font-light mb-2">Eksklusivt Tilbud: Luftrenser</h1>
            <div class="line"></div>
            <p class="serif italic text-xl text-slate-400">Kun <span class="gold-text not-italic font-semibold">500 kr.</span> — Tilbuddet udløber i morgen kl. 07:00</p>
        </header>

        <div id="countdown-container" class="premium-border rounded-3xl p-10 md:p-20 flex flex-wrap justify-center items-start gap-4 md:gap-8">
            <div class="unit-box">
                <div id="days" class="number">00</div>
                <div class="label">Dage</div>
            </div>
            
            <div class="separator">:</div>

            <div class="unit-box">
                <div id="hours" class="number">00</div>
                <div class="label">Timer</div>
            </div>

            <div class="separator">:</div>

            <div class="unit-box">
                <div id="minutes" class="number">00</div>
                <div class="label">Minutter</div>
            </div>

            <div class="separator">:</div>

            <div class="unit-box">
                <div id="seconds" class="number gold-text">00</div>
                <div class="label">Sekunder</div>
            </div>
        </div>

        <div id="completion-message" class="hidden premium-border rounded-3xl p-16 text-center">
            <h2 class="serif text-5xl gold-text mb-4">Tilbuddet er udløbet</h2>
            <p class="serif italic text-2xl">Prisen er nu vendt tilbage til normaltakst.</p>
        </div>

        <footer class="mt-16 opacity-40">
            <p class="text-[10px] uppercase tracking-[0.5em]">København — Sidste chance for 500 kr.</p>
        </footer>
    </div>

    <script>
        function updateCountdown() {
            const now = new Date();
            
            // Definer måltid: I morgen kl. 07:00
            const target = new Date();
            target.setDate(now.getDate() + 1);
            target.setHours(7, 0, 0, 0);

            const diff = target.getTime() - now.getTime();

            if (diff <= 0) {
                document.getElementById('countdown-container').classList.add('hidden');
                document.getElementById('completion-message').classList.remove('hidden');
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            // Opdater DOM
            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
        }

        // Kør med det samme og derefter hvert sekund
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
